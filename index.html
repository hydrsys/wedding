<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benoit & Alexandra | Mariage</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Playfair+Display:ital,wght@0,400;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --olive: #6b705c;
            --beige-fond: #f9f6f1;
            --beige-carte: #f1e9db;
            --terracotta: #b07d62;
            --bleu-nuit: #2c3e50;
        }

        html { scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Lato', sans-serif; color: var(--bleu-nuit); background-color: white; overflow-x: hidden; }

        /* --- NAVIGATION DYNAMIQUE --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px 0;
            text-align: center;
            z-index: 1000;
            transition: transform 0.4s ease-in-out;
            transform: translateY(-100%); /* Caché par défaut */
        }
        
        /* Classe ajoutée par le JavaScript quand on remonte */
        nav.nav-visible { transform: translateY(0); }

        nav a { 
            text-decoration: none; 
            color: var(--bleu-nuit); 
            text-transform: lowercase; 
            font-size: 0.9rem; 
            margin: 0 20px;
            letter-spacing: 1px;
        }

        /* --- SECTION ACCUEIL --- */
        #accueil {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.05), rgba(0,0,0,0.05)), 
                        url('votre-photo-de-prez.jpg') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #accueil h1 { font-family: 'Cinzel', serif; font-size: clamp(2rem, 8vw, 4rem); margin: 0; }
        #accueil p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; margin-top: 10px; }

        /* --- SECTIONS (SANS BARRES) --- */
        .section-container { padding: 100px 20px; text-align: center; max-width: 1200px; margin: auto; }
        .section-title { font-family: 'Cinzel', serif; margin-bottom: 60px; font-size: 1.2rem; letter-spacing: 3px; opacity: 0.7; }

        /* --- SECTION ESPRIT --- */
        .esprit-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
